name: Sync from-here folders to branches

on:
  pull_request:
    branches: [main]

concurrency:
  group: sync-from-here
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit message
        id: meta
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Sync all branches
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          FAILED=false

          for SOURCE_BRANCH in $(git branch -r | grep -v 'HEAD' | sed 's/origin\///'); do
            echo "Processing branch: $SOURCE_BRANCH"

            git clone --branch "$SOURCE_BRANCH" https://x-access-token:${{ secrets.GH_PAT }}@github.com/IsraelErlan/test-cicd-1.git /tmp/src-$SOURCE_BRANCH 2>/dev/null || continue

            if [ ! -d "/tmp/src-$SOURCE_BRANCH/from-here" ]; then
              echo "⚠ skipping $SOURCE_BRANCH — no from-here folder"
              rm -rf /tmp/src-$SOURCE_BRANCH
              continue
            fi

            for dir in /tmp/src-$SOURCE_BRANCH/from-here/*/; do
              FOLDER=$(basename "$dir")
              TARGET_BRANCH="$FOLDER-$SOURCE_BRANCH"
              echo "  Syncing $FOLDER → branch $TARGET_BRANCH"

              if [ -z "$(ls -A "$dir")" ]; then
                echo "  ⚠ skipping $TARGET_BRANCH — empty folder"
                continue
              fi

              if git ls-remote --heads https://x-access-token:${{ secrets.GH_PAT }}@github.com/IsraelErlan/test-cicd-2.git "$TARGET_BRANCH" | grep -q "$TARGET_BRANCH"; then
                git clone --branch "$TARGET_BRANCH" https://x-access-token:${{ secrets.GH_PAT }}@github.com/IsraelErlan/test-cicd-2.git /tmp/$TARGET_BRANCH
                cd /tmp/$TARGET_BRANCH

                git tag "backup-$TARGET_BRANCH-$(date +%Y%m%d%H%M%S)" HEAD
                git push origin "backup-$TARGET_BRANCH-$(date +%Y%m%d%H%M%S)" 2>/dev/null || true
              else
                git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/IsraelErlan/test-cicd-2.git /tmp/$TARGET_BRANCH
                cd /tmp/$TARGET_BRANCH
                git checkout --orphan "$TARGET_BRANCH"
                git rm -rf . 2>/dev/null || true
              fi

              cp -r "$dir"/. . 2>/dev/null || true

              git add .
              git diff --staged --quiet || git commit -m "${{ steps.meta.outputs.commit_msg }}"

              if ! git push origin "$TARGET_BRANCH"; then
                echo "  ✗ failed to sync $TARGET_BRANCH"
                FAILED=true
              else
                echo "  ✓ synced $TARGET_BRANCH successfully"
              fi

              cd $GITHUB_WORKSPACE
              rm -rf /tmp/$TARGET_BRANCH
            done

            rm -rf /tmp/src-$SOURCE_BRANCH
          done

          if [ "$FAILED" = true ]; then
            exit 1
          fi
