name: Sync from-here folders to branches

on:
  pull_request:
    branches: [main]

concurrency:
  group: sync-from-here
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: src
          fetch-depth: 0

      - name: Get changed folders and commit message
        id: meta
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep '^from-here/' | cut -d'/' -f2 | sort -u | tr '\n' ' ')
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "folders=$CHANGED" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Sync changed folders only
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          if [ -z "${{ steps.meta.outputs.folders }}" ]; then
            echo "⚠ no changes detected in from-here"
            exit 0
          fi

          FAILED=false

          for BRANCH in ${{ steps.meta.outputs.folders }}; do
            dir="from-here/$BRANCH"
            echo "Syncing $dir → branch $BRANCH"

            if [ ! -d "$GITHUB_WORKSPACE/$dir" ]; then
              echo "⚠ skipping $BRANCH — folder not found"
              continue
            fi

            if [ -z "$(ls -A "$GITHUB_WORKSPACE/$dir")" ]; then
              echo "⚠ skipping $BRANCH — empty folder"
              continue
            fi

            if git ls-remote --heads https://x-access-token:${{ secrets.GH_PAT }}@github.com/IsraelErlan/test-cicd-2.git "$BRANCH" | grep -q "$BRANCH"; then
              git clone --depth 1 --branch "$BRANCH" https://x-access-token:${{ secrets.GH_PAT }}@github.com/IsraelErlan/test-cicd-2.git /tmp/$BRANCH
              cd /tmp/$BRANCH

              git fetch --unshallow 2>/dev/null || true
              git tag "backup-$BRANCH-$(date +%Y%m%d%H%M%S)" HEAD
              git push origin "backup-$BRANCH-$(date +%Y%m%d%H%M%S)" 2>/dev/null || true

              git pull origin "$BRANCH" --rebase 2>/dev/null || git rebase --abort 2>/dev/null || true
            else
              git clone --depth 1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/IsraelErlan/test-cicd-2.git /tmp/$BRANCH
              cd /tmp/$BRANCH
              git checkout --orphan "$BRANCH"
              git rm -rf . 2>/dev/null || true
            fi

            cp -r "$GITHUB_WORKSPACE/$dir"/. . 2>/dev/null || true

            git add .
            git diff --staged --quiet || git commit -m "${{ steps.meta.outputs.commit_msg }}"

            if ! git push origin "$BRANCH"; then
              echo "✗ failed to sync $BRANCH"
              FAILED=true
              cd $GITHUB_WORKSPACE
              rm -rf /tmp/$BRANCH
              continue
            fi

            echo "✓ synced $BRANCH successfully"
            cd $GITHUB_WORKSPACE
            rm -rf /tmp/$BRANCH
          done

          if [ "$FAILED" = true ]; then
            exit 1
          fi
