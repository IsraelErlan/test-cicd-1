name: Sync from-here folders to branches

on:
  pull_request:
    branches: [main]

concurrency:
  group: sync-from-here
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit message
        id: meta
        run: |
          echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git log -1 --pretty=%B FETCH_HEAD >> $GITHUB_OUTPUT
          else
            git log -1 --pretty=%B >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Sync all branches
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          COMMIT_MSG: ${{ steps.meta.outputs.commit_msg || 'Automated folder sync' }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          FAILED=false
          TIMESTAMP=$(date +%Y%m%d%H%M%S)

          TARGET_REPO_DIR="/tmp/target-repo"
          git clone https://x-access-token:${GH_PAT}@github.com/IsraelErlan/test-cicd-2.git $TARGET_REPO_DIR

          for REMOTE_BRANCH in $(git branch -r | grep 'origin/' | grep -v 'HEAD'); do
            SOURCE_BRANCH=${REMOTE_BRANCH#origin/}
            echo "Processing branch: $SOURCE_BRANCH"

            cd $GITHUB_WORKSPACE
            git checkout -B "$SOURCE_BRANCH" "$REMOTE_BRANCH" --quiet || continue

            if [ ! -d "from-here" ]; then
              echo "⚠ skipping $SOURCE_BRANCH — no from-here folder"
              continue
            fi

            for dir in from-here/*/; do
              cd $GITHUB_WORKSPACE
              [ -e "$dir" ] || break

              FOLDER=$(basename "$dir")
              TARGET_BRANCH="$FOLDER-$SOURCE_BRANCH"
              echo "  Syncing $FOLDER → branch $TARGET_BRANCH"

              if [ -z "$(ls -A "$dir")" ]; then
                echo "  ⚠ skipping $TARGET_BRANCH — empty folder"
                continue
              fi

              cd $TARGET_REPO_DIR

              git reset --hard HEAD 2>/dev/null || true
              git clean -fdx

              IS_ORPHAN=false
              if git ls-remote --heads origin "$TARGET_BRANCH" | grep -q "$TARGET_BRANCH"; then
                git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
                git clean -fdx
              else
                git checkout --orphan "$TARGET_BRANCH"
                git rm -rf . --quiet 2>/dev/null || true
                git clean -fdx
                IS_ORPHAN=true
              fi

              if ! rsync -av --delete --exclude='.git/' "$GITHUB_WORKSPACE/$dir"/ .; then
                echo "  ✗ failed to rsync files for $TARGET_BRANCH — aborting branch sync"
                FAILED=true
                continue
              fi

              git add .

              if ! git diff --cached --quiet; then
                if [ "$IS_ORPHAN" = false ]; then
                  BACKUP_TAG="backup-$TARGET_BRANCH-$TIMESTAMP"
                  git tag "$BACKUP_TAG" HEAD
                  git push origin "$BACKUP_TAG" --quiet 2>/dev/null || true

                  git fetch origin "$TARGET_BRANCH" 2>/dev/null || true
                  PUSH_OPTS="--force-with-lease"
                else
                  PUSH_OPTS="--force"
                fi

                git commit -m "$COMMIT_MSG"

                if ! git push origin "$TARGET_BRANCH" $PUSH_OPTS; then
                  echo "  ✗ failed to push $TARGET_BRANCH"
                  FAILED=true
                else
                  echo "  ✓ synced $TARGET_BRANCH successfully"
                fi
              else
                echo "  ~ no changes for $TARGET_BRANCH"
              fi
            done
          done

          if [ "$FAILED" = true ]; then
            exit 1
          fi
